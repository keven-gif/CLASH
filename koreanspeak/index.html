<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KoreanSpeak">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Learn to speak Korean fluently in 3 months. Zero reading required. Audio-first language learning.">
  <meta name="keywords" content="Korean, language learning, speak Korean, audio learning, PWA">
  <meta property="og:title" content="KoreanSpeak - Master Korean Speaking">
  <meta property="og:description" content="Learn to speak Korean fluently in 3 months. Zero reading required.">
  <meta property="og:type" content="website">

  <title>KoreanSpeak - Master Korean Speaking</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./assets/icons/icon-512.png">

  <link rel="stylesheet" href="./css/00-design-system.css">
  <link rel="stylesheet" href="./css/01-animations.css">
  <link rel="stylesheet" href="./css/02-components.css">
  <link rel="stylesheet" href="./css/03-screens.css">
  <link rel="stylesheet" href="./css/04-utilities.css">

  <script>
    window.CONFIG = window.CONFIG || {};
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('SW registered:', registration.scope);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>

  <style>
    html, body { background: #0a0a0f; }
    .app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: #0a0a0f;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    .app-loading.hidden { opacity: 0; pointer-events: none; }
    .app-loading .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58cc02, #ce82ff);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-ring 2s infinite;
    }
    .app-loading .loading-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #58cc02, #ffc800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="app-loading" id="app-loading">
    <div class="loading-logo">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </div>
    <div class="loading-title">KoreanSpeak</div>
  </div>

  <div id="app"></div>

  <script type="module">
    import { ui } from './js/09-ui-renderer.js';

    document.addEventListener('DOMContentLoaded', () => {
      const loading = document.getElementById('app-loading');

      try {
        ui.init();

        setTimeout(() => {
          if (loading) {
            loading.classList.add('hidden');
            setTimeout(() => loading.remove(), 500);
          }
        }, 500);
      } catch (error) {
        console.error('Failed to initialize app:', error);
        if (loading) {
          loading.innerHTML = '<div style="color:#ff4b4b;text-align:center;padding:24px;"><div style="font-size:48px;margin-bottom:12px;">❌</div><div style="font-size:18px;font-weight:600;margin-bottom:8px;">Something went wrong</div><div style="color:rgba(255,255,255,0.5);font-size:14px;">Please refresh the page to try again.</div></div>';
        }
      }
    });

    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('dblclick', (e) => e.preventDefault());

    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
</body>
</html>
